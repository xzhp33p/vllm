name: Docker Build and Push

on:
  workflow_dispatch:
    inputs:
      cuda_version:
        description: 'CUDA version (e.g., 12.9.1, 12.8.0, 12.6.0)'
        required: true
        type: string
      image_tag:
        description: 'Docker image tag (e.g., latest, 1.0.0, v2.0.0)'
        required: true
        type: string
      target:
        description: 'Docker target to build'
        required: false
        default: 'vllm-openai'
        type: choice
        options:
          - vllm-openai
          - dev
          - test

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          platforms: linux/amd64
          target: ${{ inputs.target || 'vllm-openai' }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}:${{ inputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            CUDA_VERSION=${{ inputs.cuda_version }}
            PYTHON_VERSION=3.12
          # Provenance attestation for security
          provenance: true
          sbom: true
